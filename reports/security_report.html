<!DOCTYPE html>
<html>
<head>
    <title>AWS Security Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #0f1117;
            color: #e0e0e0;
        }
        h1 {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }
        .summary {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            gap: 30px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 48px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 14px;
            color: #888;
        }
        .critical { color: #ff4444; }
        .high { color: #ff8800; }
        .green { color: #00cc44; }
        .finding {
            background: #1a1f2e;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 5px solid #ccc;
        }
        .finding.CRITICAL { border-left-color: #ff4444; }
        .finding.HIGH { border-left-color: #ff8800; }
        .badge {
            padding: 4px 12px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }
        .badge.CRITICAL { background: #ff4444; }
        .badge.HIGH { background: #ff8800; }
        .meta {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }
        .fix {
            background: #0d1f0d;
            border: 1px solid #00cc44;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            color: #00cc44;
            font-size: 13px;
        }
        .clean {
            background: #0d1f0d;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #00cc44;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>AWS Security Posture Report</h1>
    <p class="meta">Generated: 2026-05-03 14:26:44</p>

    <div class="summary">
        <div class="stat">
            <div class="stat-number"
            style="color:#e0e0e0">0</div>
            <div class="stat-label">Total Findings</div>
        </div>
        <div class="stat">
            <div class="stat-number critical">
            0</div>
            <div class="stat-label">Critical</div>
        </div>
        <div class="stat">
            <div class="stat-number high">
            0</div>
            <div class="stat-label">High</div>
        </div>
    </div>

    <div class="clean">
        <h2 class="green">No findings detected</h2>
        <p>Your AWS environment passed all
        security checks.</p>
    </div>

</body>
</html>
